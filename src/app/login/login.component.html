<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="login-container">
    <header class="top-bar">
      <button class="icon-btn" routerLink="/">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </header>

    <div class="header-section">
      <div class="logo-box">
        <ion-icon name="checkbox-outline" class="logo-icon"></ion-icon>
      </div>
      <h1 class="title">Welcome Back</h1>
      <p class="subtitle">Ready to conquer your tasks?</p>
    </div>

    @if (authService.authError()) {
      <div class="error-banner">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <span>{{ authService.authError() }}</span>
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="form-group">
      <div class="input-wrapper">
        <label class="input-label">Email Address</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="name@example.com"
          class="custom-input"
          [class.invalid]="loginForm.controls.email.touched && loginForm.controls.email.invalid">
      </div>

      <div class="input-wrapper">
        <div class="label-row">
          <label class="input-label">Password</label>
          <button type="button" class="link-btn">Forgot Password?</button>
        </div>
        <div class="password-container">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            formControlName="password" 
            placeholder="Enter your password"
            class="custom-input"
            [class.invalid]="loginForm.controls.password.touched && loginForm.controls.password.invalid">
          <button type="button" class="visibility-toggle" (click)="togglePassword()">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || authService.isLoadingEmail()">
        @if (authService.isLoadingEmail()) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Log In
        }
      </button>
    </form>

    <div class="divider">
      <div class="line"></div>
      <span class="divider-text">OR CONTINUE WITH</span>
      <div class="line"></div>
    </div>

    <div class="social-group">
      <button class="btn-social google" (click)="authService.loginWithGoogle()" [disabled]="authService.isLoadingGoogle()">
        @if (authService.isLoadingGoogle()) {
          <ion-spinner name="crescent" color="dark"></ion-spinner>
        } @else {
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="Google" class="social-icon">
          Continue with Google
        }
      </button>
      
      <button class="btn-social apple">
        <ion-icon name="logo-apple"></ion-icon>
        Continue with Apple
      </button>
    </div>

    <footer class="footer">
      <p>Don't have an account? 
        <button class="link-btn bold" routerLink="/signup">Sign up</button>
      </p>
    </footer>

    <div class="glow glow-top"></div>
    <div class="glow glow-bottom"></div>
  </div>
</ion-content>
